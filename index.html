<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FIFA 32 Tournament</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

input,select,button{
  padding:5px;
  margin:3px;
  border-radius:5px;
}

input{width:35px;text-align:center;}

.group{
  background:#1e293b;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.flag{width:22px;}

table{
  width:75%;
  margin:auto;
  font-size:12px;
  border-collapse:collapse;
}

th,td{
  border:1px solid #444;
  padding:4px;
}
</style>
</head>

<body>

<h2>🌍 FIFA 32 Tournament</h2>

<input id="name" placeholder="Player name">
<select id="country"></select>
<button onclick="register()">Register</button>

<p id="count">0 / 32</p>

<button style="background:red;color:white" onclick="resetTournament()">🗑 Reset Tournament</button>

<hr>

<h3 id="mdTitle">Matchday 1</h3>
<div id="matches"></div>

<button onclick="nextMatchday()">Next Matchday</button>
<button onclick="generateKnockout()">Generate Knockout</button>

<h2>📊 Table</h2>
<table id="table"></table>

<h2>🏆 Knockout</h2>
<div id="knockout"></div>

<script>

const SAVE_KEY = "fifa32_tournament_save";

// COUNTRIES
const countries=[
"Nigeria","Brazil","Argentina","France","England","Germany","Spain","Portugal",
"Netherlands","Belgium","Ghana","Morocco","Senegal","USA","Mexico","Japan",
"Croatia","Denmark","Norway","Italy","Switzerland","Sweden","Poland","Austria",
"Turkey","Colombia","Chile","Peru","South Korea","Australia","Canada","Ivory Coast"
];

// FLAGS
const flags={
Nigeria:"ng",Brazil:"br",Argentina:"ar",France:"fr",
England:"gb-eng",Germany:"de",Spain:"es",Portugal:"pt",
Netherlands:"nl",Belgium:"be",Ghana:"gh",Morocco:"ma",
Senegal:"sn",USA:"us",Mexico:"mx",Japan:"jp",
Croatia:"hr",Denmark:"dk",Norway:"no",Italy:"it",
Switzerland:"ch",Sweden:"se",Poland:"pl",Austria:"at",
Turkey:"tr",Colombia:"co",Chile:"cl",Peru:"pe",
"South Korea":"kr",Australia:"au",Canada:"ca","Ivory Coast":"ci"
};

// STATE
let players=[];
let groups={A:[],B:[],C:[],D:[],E:[],F:[],G:[],H:[]};
let results={};
let currentMatchday=0;

let r16=[],qf=[],sf=[],final=[];

/* ================= LOCAL STORAGE ================= */

function saveData(){
  localStorage.setItem(SAVE_KEY, JSON.stringify({
    players,
    groups,
    results,
    currentMatchday,
    r16,
    qf,
    sf,
    final
  }));
}

function loadData(){
  const data = JSON.parse(localStorage.getItem(SAVE_KEY));
  if(!data) return;

  players = data.players || [];
  groups = data.groups || {A:[],B:[],C:[],D:[],E:[],F:[],G:[],H:[]};
  results = data.results || {};
  currentMatchday = data.currentMatchday || 0;

  r16 = data.r16 || [];
  qf = data.qf || [];
  sf = data.sf || [];
  final = data.final || [];
}

loadData();

/* ================= UI ================= */

let select=document.getElementById("country");

function loadDropdown(){
  select.innerHTML="";
  countries.forEach(c=>{
    if(!players.find(p=>p.country===c)){
      let o=document.createElement("option");
      o.value=c;
      o.textContent=c;
      select.appendChild(o);
    }
  });
}
loadDropdown();

function flag(c){
  return `<img class="flag" src="https://flagcdn.com/w40/${flags[c]}.png">`;
}

/* ================= REGISTER ================= */

function register(){
  let name=document.getElementById("name").value.trim();
  let country=select.value;

  if(!name) return alert("Enter name");

  players.push({name,country});
  saveData();

  loadDropdown();
  document.getElementById("name").value="";
  document.getElementById("count").innerText=players.length+" / 32";

  if(players.length===32) assignGroups();
}

/* ================= GROUPS ================= */

function assignGroups(){
  let keys=Object.keys(groups);
  let i=0;

  players.forEach(p=>{
    groups[keys[i]].push(p);
    i=(i+1)%8;
  });

  initTable();
  renderMatchday();
  saveData();
}

/* ================= MATCHDAY ================= */

const schedule=[
[[0,1],[2,3]],
[[0,2],[1,3]],
[[0,3],[1,2]]
];

function renderMatchday(){
  let div=document.getElementById("matches");
  div.innerHTML="";

  for(let g in groups){
    let teams=groups[g];
    let block=`<div class="group"><h3>Group ${g}</h3>`;

    schedule[currentMatchday].forEach((m,i)=>{
      let id=g+currentMatchday+i;

      block+=`
        ${flag(teams[m[0]].country)}
        <input id="${id}a"> -
        <input id="${id}b">
        ${flag(teams[m[1]].country)}
        <button onclick="play('${g}','${teams[m[0]].country}','${teams[m[1]].country}','${id}',this)">✔</button><br>
      `;
    });

    block+="</div>";
    div.innerHTML+=block;
  }

  document.getElementById("mdTitle").innerText="Matchday "+(currentMatchday+1);
  saveData();
}

/* ================= TABLE ================= */

function initTable(){
  for(let g in groups){
    results[g]={};
    groups[g].forEach(t=>{
      results[g][t.country]={pts:0,gd:0};
    });
  }
  updateTable();
  saveData();
}

function updateTable(){
  let table=document.getElementById("table");

  table.innerHTML="<tr><th>Group</th><th>Team</th><th>Pts</th><th>GD</th></tr>";

  for(let g in results){

    table.innerHTML+=`<tr><td colspan="4" style="background:#111827">Group ${g}</td></tr>`;

    let sorted=Object.entries(results[g])
      .sort((a,b)=>b[1].pts-a[1].pts || b[1].gd-a[1].gd);

    sorted.forEach((t,i)=>{
      table.innerHTML+=`
        <tr style="background:${i<2?'#16a34a':''}">
          <td></td>
          <td>${flag(t[0])}</td>
          <td>${t[1].pts}</td>
          <td>${t[1].gd}</td>
        </tr>
      `;
    });
  }

  saveData();
}

/* ================= PLAY MATCH ================= */

function play(g,a,b,id,btn){
  let A=document.getElementById(id+"a");
  let B=document.getElementById(id+"b");

  let x=parseInt(A.value);
  let y=parseInt(B.value);

  if(isNaN(x)||isNaN(y)) return;

  results[g][a].gd+=x-y;
  results[g][b].gd+=y-x;

  if(x>y) results[g][a].pts+=3;
  else if(y>x) results[g][b].pts+=3;
  else{
    results[g][a].pts++;
    results[g][b].pts++;
  }

  A.disabled=true;
  B.disabled=true;
  btn.disabled=true;

  updateTable();
  saveData();
}

/* ================= MATCHDAY CONTROL ================= */

function nextMatchday(){
  if(currentMatchday<2){
    currentMatchday++;
    renderMatchday();
    saveData();
  }else alert("Group stage finished!");
}

/* ================= KNOCKOUT ================= */

function generateKnockout(){
  r16=[];
  for(let g in results){
    let sorted=Object.entries(results[g])
      .sort((a,b)=>b[1].pts-a[1].pts || b[1].gd-a[1].gd);

    r16.push(sorted[0][0],sorted[1][0]);
  }
  showR16();
  saveData();
}

function showR16(){
  let k=document.getElementById("knockout");
  k.innerHTML="<h3>Round of 16</h3>";

  for(let i=0;i<16;i+=2){
    k.innerHTML+=`
      ${flag(r16[i])} vs ${flag(r16[i+1])}
      <input id="r${i}a"> -
      <input id="r${i}b">
      <button onclick="playKO('r',${i})">✔</button><br>
    `;
  }
}

function playKO(stage,i){
  let a=parseInt(document.getElementById(stage+i+"a").value);
  let b=parseInt(document.getElementById(stage+i+"b").value);

  let arr=stage==="r"?r16:stage==="q"?qf:sf;
  let next=stage==="r"?qf:stage==="q"?sf:final;

  next.push(a>b?arr[i]:arr[i+1]);

  saveData();

  if(next.length===8) showQF();
  if(next.length===4) showSF();
  if(next.length===2) showFinal();
}

function showQF(){
  let k=document.getElementById("knockout");
  k.innerHTML+="<h3>Quarter Finals</h3>";

  for(let i=0;i<8;i+=2){
    k.innerHTML+=`${flag(qf[i])} vs ${flag(qf[i+1])}
    <input id="q${i}a"> - <input id="q${i}b">
    <button onclick="playKO('q',${i})">✔</button><br>`;
  }
  saveData();
}

function showSF(){
  let k=document.getElementById("knockout");
  k.innerHTML+="<h3>Semi Finals</h3>";

  for(let i=0;i<4;i+=2){
    k.innerHTML+=`${flag(sf[i])} vs ${flag(sf[i+1])}
    <input id="s${i}a"> - <input id="s${i}b">
    <button onclick="playKO('s',${i})">✔</button><br>`;
  }
  saveData();
}

function showFinal(){
  let k=document.getElementById("knockout");
  k.innerHTML+=`
    <h3>Final</h3>
    ${flag(final[0])} vs ${flag(final[1])}
    <input id="fa"> - <input id="fb">
    <button onclick="finish()">🏆</button>
  `;
}

function finish(){
  let a=parseInt(document.getElementById("fa").value);
  let b=parseInt(document.getElementById("fb").value);

  alert("🏆 Champion: "+(a>b?final[0]:final[1]));
  saveData();
}
</script>

</body>
</html>
