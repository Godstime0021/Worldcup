<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Cup Tournament</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:10px;
}

input,select,button{
  padding:5px;
  margin:3px;
  border:none;
  border-radius:5px;
  font-size:13px;
}

input{
  width:35px;
  text-align:center;
}

button{
  background:#22c55e;
  color:white;
  cursor:pointer;
}

.group{
  background:#1e293b;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

.match{
  margin:5px;
}

.flag{
  width:22px;
  vertical-align:middle;
}

/* compact table */
table{
  width:55%;
  margin:10px auto;
  border-collapse:collapse;
  font-size:12px;
}

th,td{
  border:1px solid #444;
  padding:3px 5px;
  text-align:center;
}

th{
  background:#111827;
}
</style>
</head>

<body>

<h2>🌍 Tournament</h2>

<div>
  <input id="playerName" placeholder="Player name">
  <select id="countrySelect"></select>
  <button onclick="register()">Register</button>
  <button style="background:red;" onclick="resetTournament()">Reset Tournament</button>
  <p id="count">0 / 16</p>
</div>

<hr>

<div id="groups"></div>

<button onclick="generateQualified()">Generate Qualified Teams</button>

<div id="knockout"></div>

<script>
const countries=[
"Nigeria","Brazil","Argentina","France","England","Germany",
"Spain","Portugal","Netherlands","Belgium","Ghana","Morocco",
"Senegal","USA","Mexico","Japan"
];

const flags={
Nigeria:"ng",Brazil:"br",Argentina:"ar",France:"fr",
England:"gb",Germany:"de",Spain:"es",Portugal:"pt",
Netherlands:"nl",Belgium:"be",Ghana:"gh",Morocco:"ma",
Senegal:"sn",USA:"us",Mexico:"mx",Japan:"jp"
};

let players=[];
let groups={A:[],B:[],C:[],D:[]};
let results={};
let qualified=[];
let semi=[];
let finalTeams=[];

/* STORAGE */
function loadData(){
  let data=JSON.parse(localStorage.getItem("tournament"));
  if(data){
    players=data.players||[];
    groups=data.groups||groups;
    results=data.results||{};
    qualified=data.qualified||[];
    semi=data.semi||[];
    finalTeams=data.finalTeams||[];
  }
}

function saveData(){
  localStorage.setItem("tournament",JSON.stringify({
    players,groups,results,qualified,semi,finalTeams
  }));
}

loadData();
updateCount();
renderGroupsIfReady();

/* FLAGS */
let select=document.getElementById("countrySelect");
countries.forEach(c=>{
  let o=document.createElement("option");
  o.value=c;
  o.textContent=c;
  select.appendChild(o);
});

function flag(c){
  return `<img class="flag" src="https://flagcdn.com/w40/${flags[c]}.png">`;
}

/* REGISTER */
function register(){
  let name=document.getElementById("playerName").value.trim();
  let country=select.value;

  if(!name) return alert("Enter name");
  if(players.length>=16) return alert("Max reached");

  if(players.find(p=>p.country===country))
    return alert("Country already taken");

  players.push({name,country});
  document.getElementById("playerName").value="";

  updateCount();
  saveData();

  if(players.length===16){
    assignGroups();
  }
}

function updateCount(){
  document.getElementById("count").innerText=players.length+" / 16";
}

/* GROUP ASSIGN */
function assignGroups(){
  let keys=["A","B","C","D"];
  let i=0;

  players.forEach(p=>{
    groups[keys[i]].push(p);
    i=(i+1)%4;
  });

  saveData();
  renderGroups();
}

function renderGroupsIfReady(){
  if(players.length===16){
    renderGroups();
  }
}

/* MATCHDAY SYSTEM */
function renderGroups(){
  let container=document.getElementById("groups");
  container.innerHTML="";

  for(let g in groups){
    results[g]=results[g]||{};

    groups[g].forEach(p=>{
      if(!results[g][p.country]){
        results[g][p.country]={pts:0,gd:0};
      }
    });

    let teams=groups[g];

    let matchdays=[
      [[0,1],[2,3]],
      [[0,2],[1,3]],
      [[0,3],[1,2]]
    ];

    let div=document.createElement("div");
    div.className="group";
    div.innerHTML=`<h3>Group ${g}</h3>`;

    matchdays.forEach((day,dayIndex)=>{
      div.innerHTML+=`<h4>Matchday ${dayIndex+1}</h4>`;

      day.forEach(match=>{
        let i=match[0];
        let j=match[1];

        let id=g+i+j;

        div.innerHTML+=`
          <div class="match">
            ${flag(teams[i].country)}
            <input id="${id}a">
            -
            <input id="${id}b">
            ${flag(teams[j].country)}
            <button onclick="submitMatch('${g}','${teams[i].country}','${teams[j].country}','${id}')">Save</button>
          </div>
        `;
      });
    });

    div.innerHTML+=`
      <table id="table-${g}">
        <tr><th>Team</th><th>Pts</th><th>GD</th></tr>
      </table>
    `;

    container.appendChild(div);
    updateTable(g);
  }
}

/* MATCH */
function submitMatch(group,t1,t2,id){
  let a=parseInt(document.getElementById(id+"a").value);
  let b=parseInt(document.getElementById(id+"b").value);

  if(isNaN(a)||isNaN(b)) return alert("Enter scores");

  if(document.getElementById(id+"a").disabled)
    return alert("Already submitted");

  results[group][t1].gd += (a-b);
  results[group][t2].gd += (b-a);

  if(a>b) results[group][t1].pts+=3;
  else if(b>a) results[group][t2].pts+=3;
  else{
    results[group][t1].pts++;
    results[group][t2].pts++;
  }

  document.getElementById(id+"a").disabled=true;
  document.getElementById(id+"b").disabled=true;

  saveData();
  updateTable(group);
}

/* TABLE WITH HIGHLIGHT */
function updateTable(group){
  let table=document.getElementById("table-"+group);

  let sorted=Object.entries(results[group])
    .sort((a,b)=>b[1].pts-a[1].pts || b[1].gd-a[1].gd);

  table.innerHTML=`<tr><th>Team</th><th>Pts</th><th>GD</th></tr>`;

  sorted.forEach((t,index)=>{
    let style="";

    if(index===0) style="background:#16a34a";
    if(index===1) style="background:#22c55e";

    table.innerHTML+=`
      <tr style="${style}">
        <td>${flag(t[0])}</td>
        <td>${t[1].pts}</td>
        <td>${t[1].gd}</td>
      </tr>
    `;
  });
}

/* QUALIFIED */
function generateQualified(){
  qualified=[];

  for(let g in results){
    let sorted=Object.entries(results[g])
      .sort((a,b)=>b[1].pts-a[1].pts || b[1].gd-a[1].gd);

    qualified.push(sorted[0][0]);
    qualified.push(sorted[1][0]);
  }

  qualified=qualified.slice(0,8);

  saveData();
  showKnockout();
}

/* KNOCKOUT */
function showKnockout(){
  let k=document.getElementById("knockout");

  k.innerHTML="<h2>🏆 Quarter Finals</h2>";

  let matches=[
    [qualified[0],qualified[7]],
    [qualified[1],qualified[6]],
    [qualified[2],qualified[5]],
    [qualified[3],qualified[4]]
  ];

  matches.forEach((m,i)=>{
    k.innerHTML+=`
      <div>
        ${flag(m[0])} ${m[0]} vs ${flag(m[1])} ${m[1]}
        <input id="q${i}a"> -
        <input id="q${i}b">
        <button onclick="playQuarter(${i})">Play</button>
      </div>
    `;
  });
}

function playQuarter(i){
  let a=parseInt(document.getElementById("q"+i+"a").value);
  let b=parseInt(document.getElementById("q"+i+"b").value);

  if(isNaN(a)||isNaN(b)) return alert("Enter score");

  let winner=a>b ? qualified[i] : qualified[7-i];
  semi.push(winner);

  saveData();

  if(semi.length===4) showSemi();
}

/* SEMI */
function showSemi(){
  let k=document.getElementById("knockout");

  k.innerHTML+="<h2>🥈 Semi Finals</h2>";

  let matches=[
    [semi[0],semi[1]],
    [semi[2],semi[3]]
  ];

  matches.forEach((m,i)=>{
    k.innerHTML+=`
      <div>
        ${flag(m[0])} ${m[0]} vs ${flag(m[1])} ${m[1]}
        <input id="s${i}a"> -
        <input id="s${i}b">
        <button onclick="playSemi(${i})">Play</button>
      </div>
    `;
  });
}

function playSemi(i){
  let a=parseInt(document.getElementById("s"+i+"a").value);
  let b=parseInt(document.getElementById("s"+i+"b").value);

  if(isNaN(a)||isNaN(b)) return alert("Enter score");

  let winner=a>b ? semi[i*2] : semi[i*2+1];
  finalTeams.push(winner);

  saveData();

  if(finalTeams.length===2) showFinal();
}

/* FINAL */
function showFinal(){
  let k=document.getElementById("knockout");

  k.innerHTML+="<h2>🏆 Final</h2>";

  k.innerHTML+=`
    <div>
      ${flag(finalTeams[0])} ${finalTeams[0]} vs ${flag(finalTeams[1])} ${finalTeams[1]}
      <input id="fa"> -
      <input id="fb">
      <button onclick="playFinal()">Play Final</button>
    </div>
  `;
}

function playFinal(){
  let a=parseInt(document.getElementById("fa").value);
  let b=parseInt(document.getElementById("fb").value);

  if(isNaN(a)||isNaN(b)) return alert("Enter score");

  let winner=a>b ? finalTeams[0] : finalTeams[1];

  alert("🏆 Champion: "+winner);
}

/* RESET */
function resetTournament(){
  if(!confirm("Reset tournament?")) return;

  localStorage.removeItem("tournament");

  players=[];
  groups={A:[],B:[],C:[],D:[]};
  results={};
  qualified=[];
  semi=[];
  finalTeams=[];

  document.getElementById("groups").innerHTML="";
  document.getElementById("knockout").innerHTML="";
  document.getElementById("count").innerText="0 / 16";

  alert("Tournament reset");
}
</script>

</body>
</html>
